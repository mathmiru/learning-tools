<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ナンバーリバシー</title>
    <style>
        :root { --bg: #2c3e50; --board: #27ae60; --black: #333; --white: #fff; --accent: #f1c40f; }
        body { font-family: sans-serif; background: var(--bg); color: white; display: flex; flex-direction: column; align-items: center; padding: 10px; margin: 0; min-height: 100vh; overflow-x: hidden; }
        .screen { display: none; flex-direction: column; align-items: center; width: 100%; max-width: 500px; animation: f 0.5s; box-sizing: border-box; }
        .active { display: flex; }
        @keyframes f { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .title-panel { background: rgba(0,0,0,0.2); padding: 30px 15px; border-radius: 20px; box-shadow: 0 15px 30px rgba(0,0,0,0.4); text-align: center; border-bottom: 5px solid var(--accent); width: 95%; box-sizing: border-box; }
        h1 { color: var(--accent); text-shadow: 2px 2px 4px rgba(0,0,0,0.5); font-size: 2.2rem; margin: 0; line-height: 1.2; }
        .subtitle { color: #bdc3c7; font-size: 1rem; margin: 15px 0 25px; font-weight: bold; }
        .btn { background: var(--accent); color: #2c3e50; border: none; padding: 15px; margin: 8px; font-weight: bold; font-size: 1.1rem; border-radius: 50px; cursor: pointer; width: 90%; max-width: 280px; box-shadow: 0 5px 0 #c7a008; transition: 0.2s; }
        .btn:active { transform: translateY(3px); box-shadow: 0 2px 0 #c7a008; }
        .btn-sub { background: #95a5a6; color: white; box-shadow: 0 5px 0 #7f8c8d; }
        #diff-menu { display: none; flex-direction: column; align-items: center; width: 100%; padding: 10px 0; }
        .lv-btn { border: none; padding: 10px; margin: 4px; border-radius: 8px; color: white; font-weight: bold; width: 85%; max-width: 250px; cursor: pointer; }
        .lv1{background:#2ecc71}.lv2{background:#3498db}.lv3{background:#f39c12}.lv4{background:#e67e22}.lv5{background:#e74c3c}
        .info { display: flex; width: 95%; justify-content: space-around; align-items: center; background: rgba(0,0,0,0.25); padding: 12px; border-radius: 15px; margin-bottom: 10px; box-sizing: border-box; }
        .turn-txt { padding: 6px 15px; border-radius: 20px; font-weight: bold; background: #fff; color:#2c3e50; font-size: 0.9rem; }
        #board-container { position: relative; display: flex; flex-direction: column; align-items: center; }
        #board { display: grid; grid-template-columns: repeat(6, min(14vw, 55px)); grid-template-rows: repeat(6, min(14vw, 55px)); gap: 4px; background: #145a32; padding: 8px; border-radius: 10px; box-shadow: 0 8px 20px rgba(0,0,0,0.5); }
        .cell { background: var(--board); display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; }
        .valid-move { box-shadow: inset 0 0 10px var(--accent); border: 2px solid var(--accent); background: #2ecc71; }
        .piece { width: 80%; height: 80%; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: min(5vw, 20px); box-shadow: inset -1px -2px 3px rgba(0,0,0,0.4); }
        .black { background: #2c3e50; color: white; }
        .white { background: #ecf0f1; color: #2c3e50; }
        #hand { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; width: 100%; margin-top: 10px; }
        .hand-p { width: 38px; height: 38px; background: #95a5a6; display: flex; align-items: center; justify-content: center; border-radius: 6px; cursor: pointer; font-weight: bold; border: 2px solid #7f8c8d; }
        .sel { background: var(--accent); color: #2c3e50; transform: scale(1.1); border-color: #fff; }
        .modal-bg { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; padding: 15px; box-sizing: border-box; }
        .modal-content { background: var(--bg); padding: 25px; border-radius: 20px; text-align: center; border: 4px solid var(--accent); width: 100%; max-width: 380px; }
        #rev-btn { display: none; position: fixed; bottom: 20px; right: 20px; background: var(--accent); color: #2c3e50; padding: 10px 20px; border-radius: 30px; font-weight: bold; z-index: 90; }
        .hist-controls { display: none; margin-top: 15px; gap: 20px; }
        .h-btn { background: #34495e; color: white; border: none; padding: 8px 25px; border-radius: 10px; cursor: pointer; font-weight: bold; font-size: 1.2rem; }
    </style>
</head>
<body>
    <div id="title" class="screen active">
        <div class="title-panel">
            <h1>ナンバー<br>リバシー</h1>
            <p class="subtitle">かずの パワーで はさみうち！</p>
            <button class="btn" onclick="T()">ひとりで あそぶ</button>
            <div id="diff-menu">
                <button class="lv-btn lv1" onclick="S(1,1)">Lv1 (とっても やさしい)</button>
                <button class="lv-btn lv2" onclick="S(1,2)">Lv2 (ふつう)</button>
                <button class="lv-btn lv3" onclick="S(1,3)">Lv3 (しっかり)</button>
                <button class="lv-btn lv4" onclick="S(1,4)">Lv4 (てごわい)</button>
                <button class="lv-btn lv5" onclick="S(1,5)">Lv5（かなりてごわい)</button>
            </div>
            <button class="btn" onclick="S(0,0)">ふたりで あそぶ</button>
            <button class="btn btn-sub" onclick="W('rules')">あそびかた</button>
        </div>
    </div>
    <div id="rules" class="screen">
        <div class="title-panel">
            <h2>あそびかた</h2>
            <div style="text-align:left; font-size:0.9rem; line-height:1.7; background:rgba(255,255,255,0.1); padding:15px; border-radius:15px;">
                １．てふだ から すうじを えらぶ。<br>
                ２．あいてを はさめる ばしょに おく。<br>
                ３．<b>[じぶんの ２まいの ごうけい]</b> が<br>
                　　<b>[あいだの あいての ごうけい]</b> より<br>
                　　おおきければ ひっくりかえせるよ！<br>
                ４．さいごに すうじのごうけい が おおいほうが かち！
            </div>
            <button class="btn btn-sub" onclick="W('title')" style="margin-top:15px;">タイトルに もどる</button>
        </div>
    </div>
    <div id="game" class="screen">
        <div style="display:flex; justify-content:space-between; width:95%; margin-bottom:10px;">
            <button class="btn-sub" style="border:none; padding:5px 15px; border-radius:15px; cursor:pointer;" onclick="location.reload()">やめる</button>
            <button id="ab" class="btn" style="width:120px; padding:5px; margin:0; font-size:0.85rem; background:#8e44ad; color:#fff;" onclick="A()">アシスト: OFF</button>
        </div>
        <div class="info">
            <div><small id="lb">くろ</small><br><b id="sb" style="font-size:1.4rem;">0</b></div>
            <div id="tt" class="turn-txt">くろ の ばん</div>
            <div><small id="lw">しろ</small><br><b id="sw" style="font-size:1.4rem;">0</b></div>
        </div>
        <div id="board-container">
            <div id="board"></div>
            <div id="hc" class="hist-controls">
                <button id="prev-h" class="h-btn" onclick="H(-1)">◀</button>
                <button id="next-h" class="h-btn" onclick="H(1)">▶</button>
            </div>
        </div>
        <div id="msg" style="height:25px; color:var(--accent); margin:10px 0; font-weight:bold; text-align:center;"></div>
        <div id="hand"></div>
    </div>
    <div id="info-modal" class="modal-bg" onclick="C()">
        <div class="modal-content">
            <h2 style="color:var(--accent);">スタート！</h2>
            <p id="im" style="font-size: 1.5rem; font-weight: bold; margin: 20px 0;"></p>
            <p style="font-size: 0.8rem; color:#bdc3c7;">(がめんを おしてね)</p>
        </div>
    </div>
    <div id="result-modal" class="modal-bg">
        <div class="modal-content">
            <h2 style="font-size:2rem; color:var(--accent);">しゅうりょう！</h2>
            <p id="rs" style="font-size:1.4rem; margin:20px 0;"></p>
            <h3 id="rw" style="font-size:1.8rem;"></h3>
            <button class="btn" style="width:100%" onclick="V(1)">ばんめんを みる</button>
            <button class="btn btn-sub" style="width:100%" onclick="location.reload()">タイトルへ</button>
        </div>
    </div>
    <button id="rev-btn" onclick="V(0)">けっかに もどる</button>
