<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"><title>スクエア・パズル</title><style>body{font-family:'Hiragino Maru Gothic ProN',sans-serif;text-align:center;background-color:#2c3e50;color:#fff;margin:0;padding:0;touch-action:none;user-select:none}h1{margin:15px 0 5px 0;color:#f1c40f}#game-screen,#title-screen{padding:10px}#game-screen{display:none}ruby{ruby-position:over}rt{font-size:10px;color:#fff}.title-badge{background-color:#34495e;padding:10px;border-radius:8px;margin:10px auto 15px auto;width:85%;max-width:350px;box-shadow:0 4px rgba(0,0,0,.3);display:flex;align-items:center;justify-content:space-around}.score-info{text-align:left;font-size:14px;color:#bdc3c7}.score-info span{font-size:20px;color:#f1c40f;font-weight:700}.badge-icon{font-size:40px}.badge-multiplier{font-size:20px;font-weight:700;color:#f1c40f;margin-left:5px}.rule-box{background-color:#34495e;padding:15px;border-radius:10px;margin:15px auto;max-width:400px;text-align:left;line-height:2;font-size:15px}.level-btn{display:block;width:80%;max-width:300px;margin:10px auto;padding:12px;font-size:18px;font-weight:700;color:#fff;border:none;border-radius:8px;cursor:pointer;box-shadow:0 4px rgba(0,0,0,.3);transition:transform .1s}.level-btn:active{transform:translateY(4px);box-shadow:none}.btn-tutorial{background-color:#f39c12;margin-bottom:20px}.btn-lv1{background-color:#2ecc71}.btn-lv2{background-color:#3498db}.btn-lv3{background-color:#e74c3c}.btn-lv4{background-color:#9b59b6}.btn-lv5{background-color:#34495e;border:2px solid #f1c40f;color:#f1c40f}#status-bar{font-size:16px;margin-bottom:5px}#score-counter{color:#f1c40f;font-weight:700;font-size:20px}#msg{min-height:48px;color:#e74c3c;font-weight:700;margin-bottom:5px;font-size:15px;line-height:1.8;padding:0 10px}#grid-container{margin:10px auto;display:inline-block;background-color:#1a252f;padding:10px;border-radius:12px;position:relative;b </style></head><body><div id="title-screen"><h1>スクエア・パズル</h1><div class="title-badge"><div class="score-info">TOTAL SCORE<br><span id="total-score-display">0</span> pt</div><div id="player-badge"></div></div><div class="rule-box"><strong>【あそびかた】</strong><br>① <ruby>画面<rt>がめん</rt></ruby>の<ruby>下<rt>した</rt></ruby>に「<ruby>見<rt>み</rt></ruby>つける<ruby>形<rt>かたち</rt></ruby>」が<ruby>出<rt>で</rt></ruby>ます。<br>② <ruby>盤面<rt>ばんめん</rt></ruby>を<strong><ruby>指<rt>ゆび</rt></ruby>でなぞって</strong>、お<ruby>題<rt>だい</rt></ruby>と<ruby>同<rt>おな</rt></ruby>じ<ruby>大<rt>おお</rt></ruby>きさの<ruby>四角形<rt>しかくけい</rt></ruby>を<ruby>作<rt>つく</rt></ruby>りましょう。<br>③ <ruby>縦<rt>たて</rt></ruby>と<ruby>横<rt>よこ</rt></ruby>の<ruby>向<rt>む</rt></ruby>きがちがっても、<ruby>面積<rt>めんせき</rt></ruby>が<ruby>同<rt>おな</rt></ruby>じならOK！<br>④ ぜんぶのマスをピッタリうめればクリア！</div><button class="level-btn btn-tutorial" onclick="startTutorial()">🔰 チュートリアル</button> <button class="level-btn btn-lv1" onclick="startGame(1)">レベル 1 (+100pt)</button> <button class="level-btn btn-lv2" onclick="startGame(2)">レベル 2 (+200pt)</button> <button class="level-btn btn-lv3" onclick="startGame(3)">レベル 3 (+300pt)</button> <button class="level-btn btn-lv4" onclick="startGame(4)">レベル 4 (+400pt)</button> <button class="level-btn btn-lv5" onclick="startGame(5)">レベル 5 (+500pt)</button></div><div id="game-screen"><div id="status-bar"><span id="level-display">レベル 1</span> | 今回のスコア: <span id="score-counter">0</span> pt</div><div id="msg"></div><div id="grid-container"><div id="grid"></div></div><div style="font-size:14px;color:#bdc3c7">↓ <ruby>見<rt>み</rt></ruby>つける<ruby>形<rt>かたち</rt></ruby> ↓</div><div id="task-area"></div><div style="margin-top:15px"><button class="control-btn" onclick="retryPuzzle()">🔄 やり<ruby>直<rt>なお</rt></ruby>す</button> <button class="control-btn" onclick="goToTitle()">🏠 やめる</button></div></div><div id="overlay"><h2 id="overlay-title">CLEAR!</h2><p id="overlay-desc">つぎの<ruby>問題<rt>もんだい</rt></ruby>をつくっています...</p><button id="overlay-btn" class="level-btn btn-tuto )for(let t=0;t<l;t++)0!==n[e][t]&&(e<o&&(o=e),e>d&&(d=e),t<c&&(c=t),t>a&&(a=t));tSh=[];for(let e=o;e<=d;e++){let t=[];for(let l=c;l<=a;l++)t.push(0!==n[e][l]);tSh.push(t)}rw=tSh.length,cl=tSh[0].length,ts=t.sort(()=>Math.random()-.5),document.getElementById("overlay").style.display="none",retryPuzzle()}function retryPuzzle(){ts.forEach(e=>e.cleared=!1),pG=Array(rw).fill().map(()=>Array(cl).fill(null)),iT||(mE.innerHTML="");let baseW=window.innerWidth*0.85;let baseSize=Math.floor(baseW/cl);let cellSize=Math.max(30, Math.min(45, baseSize));gE.style.gridTemplateColumns=`repeat(${cl}, ${cellSize}px)`,gE.style.gridTemplateRows=`repeat(${rw}, ${cellSize}px)`,renderGrid(),renderTasks(),iT&&updateTutorialHint()}function renderTasks(){tAE.innerHTML="",ts.forEach(e=>{let t=document.createElement("div");t.className="task-card",e.cleared&&t.classList.add("cleared"),t.innerText=`${e.w} × ${e.h}`,tAE.appendChild(t)})}function renderGrid(){gE.innerHTML="";let baseW=window.innerWidth*0.85;let cellSize=Math.max(30, Math.min(45, Math.floor(baseW/cl)));for(let e=0;e<rw;e++)for(let t=0;t<cl;t++){let l=document.createElement("div");l.className="cell",l.style.width=`${cellSize}px`,l.style.height=`${cellSize}px`,l.dataset.r=e,l.dataset.c=t,tSh[e][t]?(l.classList.add("playable"),null!==pG[e][t]&&(l.style.backgroundColor=pG[e][t],l.classList.add("occupied")),l.addEventListener("mousedown",()=>startDrag(e,t)),l.addEventListener("mouseover",()=>updateDrag(e,t)),l.addEventListener("touchstart",l=>{l.preventDefault(),startDrag(e,t)})):l.classList.add("empty-space"),gE.appendChild(l)}window.addEventListener("mouseup",endDrag),window.addEventListener("touchend",endDrag),gE.addEventListener("touchmove",handleTouchMove,{passive:!1})}function handleTouchMove(e){if(e.preventDefault(),!iD)return;let t=e.touches[0],l=document.elementFromPoint(t.clientX,t.clientY);if(l&&l.dataset&&l.dataset.r!==undefined)updateDrag(parseInt(l.dataset.r),parseInt(l.dataset.c))}function startDrag(e,t){if(null===pG[e][t]){
