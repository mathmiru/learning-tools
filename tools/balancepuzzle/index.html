<!DOCTYPE html>
<html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>てんびんパズル</title><style>body{font-family:'Helvetica Neue',Arial,sans-serif;background-color:#e0f7fa;display:flex;flex-direction:column;align-items:center;padding:20px;margin:0;color:#333;min-height:100vh}.screen{display:none;flex-direction:column;align-items:center;width:100%;max-width:700px}.screen.active{display:flex;animation:_f 0.4s ease-in}@keyframes _f{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}#title-screen{background:#fff;padding:40px 30px;border-radius:20px;box-shadow:0 8px 15px rgba(0,0,0,0.1);text-align:center;margin-top:30px}#title-screen h1{color:#00838f;font-size:2.2em;margin-bottom:10px}#title-screen p{font-size:1.1em;color:#555;line-height:1.6;margin-bottom:30px}.level-select{display:flex;flex-direction:column;gap:15px;align-items:center}.btn-level{padding:15px 40px;font-size:1.5em;font-weight:bold;color:#fff;border:none;border-radius:30px;cursor:pointer;width:80%;max-width:350px;transition:transform 0.1s}.btn-level:active{transform:translateY(4px)}.btn-easy{background-color:#2ecc71;box-shadow:0 5px 0 #27ae60}.btn-normal{background-color:#f39c12;box-shadow:0 5px 0 #d35400}.btn-hard{background-color:#e74c3c;box-shadow:0 5px 0 #c0392b}.level-desc{font-size:0.6em;display:block;font-weight:400;margin-top:5px;opacity:0.9}#game-header{display:flex;justify-content:space-between;width:100%;align-items:center;margin-bottom:15px;background:#fff;padding:10px 20px;border-radius:15px;box-shadow:0 4px 6px rgba(0,0,0,0.05);box-sizing:border-box}.header-left{display:flex;flex-direction:column;align-items:flex-start}.stage-txt{font-size:1em;color:#7f8c8d;font-weight:bold}.diff-txt{font-size:1.2em;color:#00838f;font-weight:bold}.btn-back-header{margin-top:8px;padding:5px 12px;font-size:0.85em;background-color:#95a5a6;color:#fff;border:none;border-radius:15px;cursor:pointer;font-weight:bold}.header-right{text-align:right}.score-txt{font-size:1.8em;color:#d35400;font-weight:bold}.combo-txt{font-size:1.2em;color:#e67e22;font-weight:bold;min-height:1.2em}#status-board{font-size:2em;font-weight:bold;margin-bottom:10px;padding:5px 40px;background:#fff;border-radius:20px;box-shadow:0 4px 6px rgba(0,0,0,0.1);text-align:center;min-width:300px}#scale-container{position:relative;width:600px;height:240px;display:flex;flex-direction:column;align-items:center;margin-bottom:10px}#beam{position:absolute;top:70px;width:500px;height:16px;background-color:#8d6e63;border-radius:8px;transform-origin:center center;transition:transform 0.6s cubic-bezier(0.45,0.05,0.55,0.95),background-color 0.3s;display:flex;justify-content:space-between;z-index:2}#beam.balanced{background-color:#2ecc71;box-shadow:0 0 20px rgba(46,204,113,0.8)}.tray{width:200px;height:90px;margin-top:-90px;display:flex;flex-wrap:wrap-reverse;align-content:flex-start;justify-content:center;gap:5px;padding-bottom:5px;border-bottom:4px solid rgba(0,0,0,0.1)}#fulcrum{position:absolute;top:78px;width:0;height:0;border-left:40px solid transparent;border-right:40px solid transparent;border-bottom:80px solid #7f8c8d;z-index:1}#waiting-area{width:100%;min-height:120px;background:#fff;border:3px dashed #bdc3c7;border-radius:15px;padding:20px;display:flex;flex-wrap:wrap;justify-content:center;gap:15px;margin-bottom:20px;position:relative;box-sizing:border-box}.weight-card{display:flex;flex-direction:column;align-items:center;background:#f1c40f;padding:8px;border-radius:10px;box-shadow:0 6px 0 #d35400;transition:transform 0.2s,box-shadow 0.2s;animation:_p 0.3s ease-out}.tray .weight-card{box-shadow:0 3px 0 #d35400;transform:translateY(3px);margin-bottom:5px}.w-val{font-size:26px;font-weight:bold;color:#fff;width:50px;height:50px;display:flex;justify-content:center;align-items:center;background:#e67e22;border-radius:8px}.btn-group{display:flex;gap:5px;margin-top:8px}.w-btn{padding:6px 10px;font-size:13px;font-weight:bold;color:#fff;border:none;border-radius:5px;cursor:pointer;transition:opacity 0.2s}.btn-left{background-color:#3498db}.btn-right{background-color:#e74c3c}.btn-down{background-color:#95a5a6}@keyframes _p{from{transform:scale(0);opacity:0}to{transform:scale(1);opacity:1}}#success-overlay{display:none;position:absolute;top:0;left:0;width:100%;height:100%;background:rgba(255,255,255,0.95);border-radius:15px;flex-direction:column;align-items:center;justify-content:center;z-index:10}#success-overlay h2{color:#2ecc71;font-size:2.5em;margin:0 0 5px 0}.btn-next{padding:15px 40px;font-size:1.3em;font-weight:bold;background-color:#3498db;color:#fff;border:none;border-radius:30px;cursor:pointer;box-shadow:0 4px 0 #2980b9}.btn-title-reset{margin-top:20px;background:none;border:none;color:#95a5a6;cursor:pointer;text-decoration:underline}rt{font-size:0.5em;font-weight:normal}</style></head><body><div id="title-screen" class="screen active"><h1>てんびんパズル</h1><p><ruby>同<rt>おな</rt></ruby>じ<ruby>重<rt>おも</rt></ruby>さ（＝）にできたらクリア！</p><div class="level-select"><button class="btn-level btn-easy" onclick="_s('easy')">かんたん<span class="level-desc">10までの かず</span></button><button class="btn-level btn-normal" onclick="_s('normal')">ふつう<span class="level-desc">30までの かず</span></button><button class="btn-level btn-hard" onclick="_s('hard')">むずかしい<span class="level-desc"><ruby>大<rt>おお</rt></ruby>きな かず</span></button></div></div><div id="game-screen" class="screen"><div id="game-header"><div class="header-left"><span class="diff-txt" id="display-diff"></span> <span class="stage-txt">ステージ <span id="display-stage">1</span></span><button class="btn-back-header" onclick="_b()">◀ タイトルにもどる</button></div><div class="header-right"><div class="score-txt">SCORE: <span id="display-score">0</span></div><div class="combo-txt" id="display-combo"></div></div></div><div id="status-board"><span id="left-total" style="color:#3498db">0</span> <span id="operator" style="color:#7f8c8d">？</span> <span id="right-total" style="color:#e74c3c">0</span></div><div id="scale-container"><div id="beam"><div id="tray-left" class="tray"></div><div id="tray-right" class="tray"></div></div><div id="fulcrum"></div></div><div id="waiting-area"><div id="success-overlay"><h2>せいかい！</h2><div style="margin-bottom:15px;font-weight:700" id="earned-points"></div><button class="btn-next" onclick="_n()"><ruby>次<rt>つぎ</rt></ruby>のステージへ</button><button class="btn-title-reset" onclick="_b()">タイトルへもどる</button></div></div></div><script>(function(){let _a={d:'easy',s:1,p:0,c:0},_v=[],_k=!1;window._s=function(d){_a={d:d,s:1,p:0,c:0};document.getElementById('display-diff').innerText=d==='easy'?'かんたん':(d==='normal'?'ふつう':'むずかしい');document.getElementById('title-screen').classList.remove('active');document.getElementById('game-screen').classList.add('active');_g()};window._b=function(){document.getElementById('game-screen').classList.remove('active');document.getElementById('title-screen').classList.add('active')};window._n=function(){_a.s++;_g()};function _g(){_k=!1;document.getElementById('success-overlay').style.display='none';document.getElementById('beam').classList.remove('balanced');_u();let m=Math.min(0x4,0x2+Math.floor((_a.s-0x1)/0x5)),i=Math.max(0x1,m-0x1),t;if(_a.d==='easy')t=0x5+Math.floor(Math.random()*0x6);else if(_a.d==='normal')t=0xf+Math.floor(Math.random()*0xb);else t=0x1e+Math.floor(Math.random()*0x1f);let pA=Math.floor(Math.random()*(m-i+0x1))+i,pB=Math.floor(Math.random()*(m-i+0x1))+i;if(pA===0x1&&pB===0x1)pA++;let c=[..._x(t,pA),..._x(t,pB)];c.sort(()=>Math.random()-0.5);_v=c.map((v,x)=>({id:x,v:v,l:'waiting'}));_r();_q()}function _x(n,p){if(p===0x1)return[n];let r=[],e=n;for(let i=0;i<p-0x1;i++){let v=Math.max(0x1,Math.floor(Math.random()*(e-(p-0x1-i))));r.push(v);e-=v}r.push(e);return r}function _r(){let tl=document.getElementById('tray-left'),tr=document.getElementById('tray-right'),tw=document.getElementById('waiting-area'),ov=document.getElementById('success-overlay');tl.innerHTML=tr.innerHTML=tw.innerHTML='';tw.appendChild(ov);_v.forEach(w=>{let d=document.createElement('div');d.className='weight-card';d.innerHTML=`<div class="w-val">${w.v}</div>`;let g=document.createElement('div');g.className='btn-group';if(w.l==='waiting')g.innerHTML=`<button class="w-btn btn-left" onclick="_m(${w.id},'left')">← <ruby>左<rt>ひだり</rt></ruby></button><button class="w-btn btn-right" onclick="_m(${w.id},'right')"><ruby>右<rt>みぎ</rt></ruby> →</button>`;else g.innerHTML=`<button class="w-btn btn-down" onclick="_m(${w.id},'waiting')">もどす</button>`;d.appendChild(g);(w.l==='left'?tl:(w.l==='right'?tr:tw)).appendChild(d)})}window._m=function(i,l){if(!_k){_v[i].l=l;_r();_q()}};function _q(){let L=_v.filter(w=>w.l==='left').reduce((s,w)=>s+w.v,0),R=_v.filter(w=>w.l==='right').reduce((s,w)=>s+w.v,0);document.getElementById('left-total').innerText=L;document.getElementById('right-total').innerText=R;let d=R-L,a=Math.max(-25,Math.min(25,d*1.2));document.getElementById('beam').style.transform=`rotate(${a}deg)`;let o=document.getElementById('operator');if(L===R&&L>0){if(_v.filter(w=>w.l==='waiting').length===0x0){o.innerText="＝";o.style.color="#2ecc71";_k=!0;_z()}else{o.innerText="＝";o.style.color="#f39c12"}}else{o.innerText=L>R?"＞":(L<R?"＜":"？");o.style.color="#7f8c8d"}}function _z(){_a.c++;let p=(_a.d==='easy'?0x32:0x64)+(_a.c*0xa);_a.p+=p;document.getElementById('beam').classList.add('balanced');document.getElementById('earned-points').innerText=`+${p} pts!`;_u();setTimeout(()=>{document.getElementById('success-overlay').style.display='flex'},0x258)}function _u(){document.getElementById('display-stage').innerText=_a.s;document.getElementById('display-score').innerText=_a.p;document.getElementById('display-combo').innerText=_a.c>0x1?`${_a.c} COMBO!` :""}})()</script></body></html>
