<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4色パズル：ぬりわけ名人</title>
    <style>
        :root {
            --bg-light: #ffffff;
            --text-dark: #1a1a1a;
            --accent-pink: #fb7185;
            --accent-blue: #38bdf8;
            --accent-green: #4ade80;
            --accent-yellow: #fbbf24;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Hiragino Kaku Gothic ProN', 'Meiryo', sans-serif;
            background-color: var(--bg-light); color: var(--text-dark);
            overflow: hidden;
        }

        .screen {
            display: none; width: 100vw; height: 100vh;
            flex-direction: column; align-items: center; justify-content: center;
        }
        .active { display: flex; }

        /* タイトル画面 */
        #screen-title { 
            background: #fff; position: relative; overflow-y: auto;
        }
        .title-decoration {
            position: absolute; width: 100%; height: 100%;
            background-image: linear-gradient(45deg, #f3f4f6 25%, transparent 25%, transparent 75%, #f3f4f6 75%, #f3f4f6),
                               linear-gradient(45deg, #f3f4f6 25%, transparent 25%, transparent 75%, #f3f4f6 75%, #f3f4f6);
            background-size: 80px 80px; background-position: 0 0, 40px 40px;
            opacity: 0.5; z-index: 1;
        }
        .title-box {
            z-index: 10; text-align: center; background: white; 
            padding: 30px; border: 4px solid #000; box-shadow: 15px 15px 0px #000;
            max-width: 90%; width: 450px; box-sizing: border-box;
        }
        h1 { 
            font-size: 3.5rem; margin: 0; letter-spacing: 0.1em; 
            font-weight: 900; line-height: 1.2;
        }
        .rule-box {
            background: #f8fafc; border: 2px solid #000;
            padding: 15px; margin: 20px 0; text-align: left; line-height: 1.6;
            font-size: 0.95rem;
        }
        .level-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        
        /* ゲーム画面 */
        #screen-game { background: #fff; }
        .game-header { 
            width: 100%; background: #000; color: #fff; padding: 8px; 
            text-align: center; font-weight: bold; font-size: 1rem;
        }
        canvas { background: #fff; cursor: pointer; touch-action: none; flex-grow: 1; width: 100%; }

        .ui-panel {
            width: 100%; background: #fff; border-top: 4px solid #000;
            padding: 15px; display: flex; flex-direction: column; align-items: center; gap: 10px;
            box-sizing: border-box;
        }

        .btn {
            padding: 10px 20px; font-size: 1rem; font-weight: bold;
            cursor: pointer; border: 3px solid #000; border-radius: 0;
            transition: 0.1s; box-shadow: 4px 4px 0px #000;
        }
        .btn:active { transform: translate(2px, 2px); box-shadow: 2px 2px 0px #000; }
        .btn-easy { background: var(--accent-green); }
        .btn-normal { background: var(--accent-blue); }
        .btn-hard { background: var(--accent-pink); }

        .palette { display: flex; gap: 15px; }
        .color-chip {
            width: 45px; height: 45px; border-radius: 50%; border: 3px solid #ddd;
            cursor: pointer;
        }
        .color-chip.active { border-color: #000; transform: scale(1.1); }

        .msg { font-weight: bold; font-size: 1rem; min-height: 1.5em; color: transparent; }
        .msg-show { color: #e11d48; } /* 赤色で表示 */
        .msg-error { animation: shake 0.2s; }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-4px); }
            75% { transform: translateX(4px); }
        }
    </style>
</head>
<body>

    <div id="screen-title" class="screen active">
        <div class="title-decoration"></div>
        <div class="title-box">
            <h1>
                <span style="color:var(--accent-pink)">4</span><span style="color:var(--accent-blue)">色</span><br>
                <span style="color:var(--accent-green)">パ</span><span style="color:var(--accent-yellow)">ズル</span>
            </h1>
            <div class="rule-box">
                <strong>【あそびかた】</strong><br>
                ・となりの場所と同じ色は ぬれません。<br>
                ・ぜんぶの場所を 4色で ぬりわけよう！
            </div>
            <div class="level-btns">
                <button class="btn btn-easy" onclick="initGame(12)">★ かんたん</button>
                <button class="btn btn-normal" onclick="initGame(30)">★★ ふつう</button>
                <button class="btn btn-hard" onclick="initGame(60)">★★★ むずかしい</button>
            </div>
        </div>
    </div>

    <div id="screen-game" class="screen">
        <div class="game-header">ぜんぶ ぬりわけよう！</div>
        <canvas id="gameCanvas"></canvas>
        <div class="ui-panel">
            <div id="game-msg" class="msg">メッセージエリア</div>
            <div class="palette" id="palette"></div>
            <div style="display:flex; gap:10px;">
                <button class="btn" style="background:#eee; font-size:0.8rem; box-shadow:2px 2px 0px #000;" onclick="location.reload()">タイトルへ</button>
                <button class="btn btn-normal" id="checkBtn" style="font-size:0.8rem; box-shadow:2px 2px 0px #000;" onclick="checkClear()">できた！</button>
            </div>
        </div>
    </div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const msgEl = document.getElementById('game-msg');
    const colors = ['#fb7185', '#38bdf8', '#4ade80', '#fbbf24'];
    
    let selectedColor = colors[0];
    let regions = [], adj = [], mapData = null;

    function initGame(count) {
        document.getElementById('screen-title').classList.remove('active');
        document.getElementById('screen-game').classList.add('active');
        
        const palette = document.getElementById('palette');
        palette.innerHTML = '';
        colors.forEach((c, i) => {
            const chip = document.createElement('div');
            chip.className = `color-chip ${i === 0 ? 'active' : ''}`;
            chip.style.backgroundColor = c;
            chip.onclick = () => {
                document.querySelectorAll('.color-chip').forEach(el => el.classList.remove('active'));
                chip.classList.add('active');
                selectedColor = c;
                hideMsg(); // 色を変えたらメッセージを隠す
            };
            palette.appendChild(chip);
        });

        const headerH = document.querySelector('.game-header').offsetHeight;
        const panelH = document.querySelector('.ui-panel').offsetHeight;
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight - headerH - panelH;

        createMap(count);
    }

    function createMap(count) {
        const w = canvas.width, h = canvas.height;
        regions = Array.from({length: count}, (_, i) => ({ id: i, x: Math.random()*w, y: Math.random()*h, color: null }));

        mapData = new Int32Array(w * h);
        for(let y=0; y<h; y++){
            for(let x=0; x<w; x++){
                let dMin = Infinity, id = -1;
                for(let i=0; i<count; i++){
                    let d = (x-regions[i].x)**2 + (y-regions[i].y)**2;
                    if(d < dMin) { dMin = d; id = i; }
                }
                mapData[y * w + x] = id;
            }
        }

        adj = Array.from({length: count}, () => new Set());
        for(let y=0; y<h-1; y++){
            for(let x=0; x<w-1; x++){
                let idx = y*w+x;
                let c = mapData[idx], r = mapData[idx+1], d = mapData[idx+w];
                if(c!==r){ adj[c].add(r); adj[r].add(c); }
                if(c!==d){ adj[c].add(d); adj[d].add(c); }
            }
        }
        render();
    }

    canvas.addEventListener('pointerdown', (e) => {
        const rect = canvas.getBoundingClientRect();
        const x = Math.floor(e.clientX - rect.left);
        const y = Math.floor(e.clientY - rect.top);
        const id = mapData[y * canvas.width + x];

        let canPaint = true;
        for(let neighborId of adj[id]) {
            if(regions[neighborId].color === selectedColor) {
                canPaint = false;
                break;
            }
        }

        if(canPaint) {
            regions[id].color = selectedColor;
            hideMsg();
            render();
        } else {
            showMsg("となりとおなじいろです");
        }
    });

    function showMsg(text) {
        msgEl.innerText = text;
        msgEl.classList.add('msg-show', 'msg-error');
        // アニメーション用のクラスを一度消して付け直す
        setTimeout(() => msgEl.classList.remove('msg-error'), 200);
    }

    function hideMsg() {
        msgEl.classList.remove('msg-show');
    }

    function render() {
        const w = canvas.width, h = canvas.height;
        const img = ctx.createImageData(w, h);
        for(let i=0; i<mapData.length; i++){
            const id = mapData[i];
            const rgb = hexToRgb(regions[id].color || "#ffffff");
            const p = i*4;
            const isBorder = (i%w < w-1 && id !== mapData[i+1]) || (id !== mapData[i+w]);
            
            if(isBorder){
                img.data[p]=img.data[p+1]=img.data[p+2]=100;
            } else {
                img.data[p]=rgb.r; img.data[p+1]=rgb.g; img.data[p+2]=rgb.b;
            }
            img.data[p+3]=255;
        }
        ctx.putImageData(img, 0, 0);
    }

    function checkClear() {
        const allFilled = regions.every(r => r.color !== null);
        if(allFilled) {
            msgEl.innerText = "ぬりわけ大成功！";
            msgEl.style.color = "#16a34a";
            msgEl.classList.add('msg-show');
        } else {
            showMsg("まだ 白いところが あるよ！");
        }
    }

    function hexToRgb(h){
        return {r:parseInt(h.slice(1,3),16), g:parseInt(h.slice(3,5),16), b:parseInt(h.slice(5,7),16)};
    }
</script>
</body>
</html>
