<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no">
<title>Math Challenge K</title>
<style>
body{font-family:"Hiragino Maru Gothic ProN",sans-serif;background:linear-gradient(#f5fbff,#e0f2ff);text-align:center;margin:0;padding:10px;display:flex;flex-direction:column;align-items:center;min-height:100vh}h1{color:#ff7a00;font-size:1.8em;margin:10px 0}.card{background:#fff;border-radius:24px;box-shadow:0 6px 12px rgba(0,0,0,.15);padding:20px;width:100%;max-width:400px;min-height:420px;display:flex;flex-direction:column;justify-content:center;position:relative}.hidden{display:none!important}.setup-group{margin-bottom:20px}label{display:block;margin-bottom:8px;font-weight:700;color:#555;font-size:1em}select{font-size:1.2em;padding:10px;border-radius:12px;border:2px solid #4cafef;width:85%;margin-bottom:15px;background:#fff}.question{font-size:3em;margin:15px 0;font-weight:700;color:#333}input{font-size:2em;width:120px;text-align:center;border-radius:12px;border:2px solid #ccc;margin-bottom:15px;outline:0}input:focus{border-color:#4cafef}button{font-size:1.2em;padding:12px 24px;border-radius:50px;border:none;cursor:pointer;font-weight:700;transition:.2s}.btn-start{background:#ff7a00;color:#fff;font-size:1.5em;width:80%;box-shadow:0 6px #d35400}.btn-start:active{transform:translateY(4px);box-shadow:none}.btn-submit{background:#4cafef;color:#fff;width:80%;box-shadow:0 4px #2a87c5}.btn-submit:disabled{background:#ccc;box-shadow:none;cursor:not-allowed}.result{font-size:1.4em;height:1.6em;margin-top:10px;font-weight:700}.bear{font-size:3.5em;margin:10px 0}.stages span{opacity:.2;font-weight:700;margin:0 3px;font-size:1.2em}.stages .active{opacity:1;color:#ff7a00;transform:scale(1.2);display:inline-block}.bar{background:#eee;border-radius:10px;height:16px;margin:8px auto;width:80%;overflow:hidden;border:1px solid #ddd}.bar-inner{height:100%;width:0;background:linear-gradient(90deg,#ffd54f,#ff8a65);transition:width .4s}.status{margin-top:15px;font-size:1.1em;color:#666}.btn-reset{background:#999;color:#fff;font-size:.9em;margin-top:20px;padding:8px 15px}
</style>
</head>
<body>
<h1 id="_0x5a1b"></h1>
<div class="card">
    <div id="_0x4c2d">
        <div class="bear">🐻</div>
        <div class="setup-group">
            <label id="_0x1e2f"></label>
            <select id="_0x3d4e"><option value="all" id="_0x2b3c"></option></select>
        </div>
        <button class="btn-start" id="_0x6f1a" onclick="window['_0x9e2a']()"></button>
    </div>
    <div id="_0x7a8b" class="hidden">
        <div class="bear" id="_0x1c2b">🥚</div>
        <div class="growth">
            <div class="stages" id="_0x4e5f"></div>
            <div class="bar"><div class="bar-inner" id="_0x6d1e"></div></div>
        </div>
        <div class="question" id="_0x2a3d">?</div>
        <input type="text" id="_0x8c9d" inputmode="numeric" pattern="[0-9]*" placeholder="?">
        <br>
        <button id="_0x5d2e" class="btn-submit" onclick="window['_0x1f3c']()"></button>
        <div class="result" id="_0x9b1a"></div>
        <div id="_0x4b3a" style="font-size:1.2em;color:#ff7a00;font-weight:700"></div>
    </div>
</div>
<div class="status" id="_0x3e2f"></div>
<button id="_0x1d2c" class="btn-reset hidden" onclick="window['_0x8a7b']()"></button>

<script>
(function(){
    const _0x42f1 = [
        '\u4e5d\u4e5d\u7121\u9650\u30c1\u30e3\u30ec\u30f3\u30b8', // 0: Title
        '\u306a\u306b\u306e\u0020\u3060\u3093\u3092\u0020\u3084\u308b\uff1f', // 1: Label
        '\u305c\u3093\u3076', // 2: All
        '\u306e\u3060\u3093', // 3: Table suffix
        '\u306f\u3058\u3081\u308b\uff01', // 4: Start
        '\u3053\u305f\u3048\u308b', // 5: Submit
        '\u2b55\u0020\u305b\u3044\u304b\u3044\uff01', // 6: OK
        '\u274c\u0020\u3053\u305f\u3048\u306f\u0020', // 7: NG
        '\u26a0\u0020\u3059\u3046\u3058\u3092\u0020\u3044\u308c\u3066\u306d', // 8: Warn
        '\u308c\u3093\u305e\u304f\u0020\u305b\u3044\u304b\u3044\uff01\u3059\u3054\u3044\uff01', // 9: Combo
        '\u30bf\u30a4\u30c8\u30eb\u306b\u3082\u3069\u308b', // 10: Reset
        '\u305b\u3044\u304b\u3044\uff1a', // 11
        '\u0020\uff0f\u0020\u3082\u3093\u3060\u3044\uff1a' // 12
    ];
    const _0x1a2b = (i) => _0x42f1[i];
    const _d=document; let _v1,_v2,_cc=0,_tn=0,_st=0,_lk=false;

    // UI Setup
    _d.getElementById('_0x5a1b').textContent=_0x1a2b(0);
    _d.getElementById('_0x1e2f').textContent=_0x1a2b(1);
    _d.getElementById('_0x2b3c').textContent=_0x1a2b(2);
    _d.getElementById('_0x6f1a').textContent=_0x1a2b(4);
    _d.getElementById('_0x5d2e').textContent=_0x1a2b(5);
    _d.getElementById('_0x1d2c').textContent=_0x1a2b(10);
    _d.getElementById('_0x3e2f').textContent=_0x1a2b(11)+'0'+_0x1a2b(12)+'0';

    const _sel=_d.getElementById('_0x3d4e'), _stg=_d.getElementById('_0x4e5f');
    for(let i=1;i<=9;i++){let o=_d.createElement('option');o.value=i;o.textContent=i+_0x1a2b(3);_sel.appendChild(o)}
    [['🥚','s1'],['🐣','s2'],['🐤','s3'],['🐻','s4'],['🧸','s5']].forEach(x=>{let s=_d.createElement('span');s.id=x[1];s.textContent=x[0];_stg.appendChild(s)});

    const _nq=()=>{
        _lk=false;_d.getElementById('_0x5d2e').disabled=false;
        const dv=_sel.value;_v1=(dv==='all')?Math.floor(Math.random()*9)+1:Number(dv);
        _v2=Math.floor(Math.random()*9)+1;_d.getElementById('_0x2a3d').textContent=`${_v1} \u00d7 ${_v2} \u003d \uff1f`;
        const i=_d.getElementById('_0x8c9d');i.value='';i.focus();
    };

    window['_0x1f3c']=()=>{
        if(_lk)return;const raw=_d.getElementById('_0x8c9d').value;
        const fix=raw.replace(/[\uff10-\uff19]/g,s=>String.fromCharCode(s.charCodeAt(0)-0xfee0)).trim();
        const ans=Number(fix),res=_d.getElementById('_0x9b1a');
        if(fix===''||isNaN(ans)){res.textContent=_0x1a2b(8);res.style.color='#e67e22';return}
        _lk=true;_d.getElementById('_0x5d2e').disabled=true;_tn++;
        if(ans===_v1*_v2){_cc++;_st++;res.textContent=_0x1a2b(6);res.style.color='#ff4500'}
        else{_st=0;res.textContent=_0x1a2b(7)+(_v1*_v2);res.style.color='#555'}
        _d.getElementById('_0x3e2f').innerHTML=`${_0x1a2b(11)}<b style="color:#ff7a00">${_cc}</b>${_0x1a2b(12)}${_tn}`;
        _ub();_um();setTimeout(_nq,1000);
    };

    const _ub=()=>{
        const bar=_d.getElementById('_0x6d1e'),ids=['s1','s2','s3','s4','s5'];
        ids.forEach(id=>_d.getElementById(id).classList.remove('active'));
        let p=(_st/40)*100;bar.style.width=(p>100?100:p)+'%';
        let ic='🥚',ai='s1';
        if(_st>=40){ic='🧸';ai='s5'}else if(_st>=30){ic='🐻';ai='s4'}
        else if(_st>=20){ic='🐤';ai='s3'}else if(_st>=10){ic='🐣';ai='s2'}
        _d.getElementById('_0x1c2b').textContent=ic;_d.getElementById(ai).classList.add('active');
    };

    const _um=()=>{const m=_d.getElementById('_0x4b3a');m.textContent=(_st>0&&_st%10===0)?`\ud83c\udf8a ${_st}${_0x1a2b(9)}`:'';};

    window['_0x9e2a']=()=>{
        _d.getElementById('_0x4c2d').classList.add('hidden');
        _d.getElementById('_0x7a8b').classList.remove('hidden');
        _d.getElementById('_0x1d2c').classList.remove('hidden');
        _cc=0;_tn=0;_st=0;_nq();_ub();
    };

    window['_0x8a7b']=()=>{
        _d.getElementById('_0x4c2d').classList.remove('hidden');
        _d.getElementById('_0x7a8b').classList.add('hidden');
        _d.getElementById('_0x1d2c').classList.add('hidden');
    };

    _d.getElementById('_0x8c9d').onkeydown=e=>{if(e.key==='Enter')window['_0x1f3c']()};
    _ub();
})();
</script>
</body>
</html>
