<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Fraction Sim Pro</title><script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script><style>
body{font-family:sans-serif;background:#fff;margin:0;padding:5px;display:flex;justify-content:center;height:100vh;overflow:hidden}
.a-c{width:100%;max-width:950px;display:flex;flex-direction:column;gap:5px;height:100%}
.u-p{display:flex;align-items:center;justify-content:space-around;background:#f1f3f5;padding:8px;border-radius:12px;border:1px solid #dee2e6;flex-shrink:0}
.f-g{display:flex;flex-direction:column;align-items:center;gap:2px}
.f-g input{width:45px;height:30px;text-align:center;font-size:18px;border:2px solid #ccc;border-radius:6px}
.b-i{color:#0055ff;border-color:#0055ff!important}.r-i{color:#ee0000;border-color:#ee0000!important}
.l{width:100%;height:2px;background:#333}
.main-layout{display:flex;flex-direction:column;gap:10px;flex:1;min-height:0}
/* PCレイアウト調整 */
@media(min-width:768px){
  .main-layout{flex-direction:row;align-items:stretch}
  #cp{flex:0 0 auto}
  .side-panel{flex:1;display:flex;flex-direction:column;justify-content:flex-start;min-width:0}
}
.side-panel{display:flex;flex-direction:column;gap:8px}
.b-c{display:flex;gap:8px;flex-shrink:0}
button{flex:1;padding:12px;font-size:16px;font-weight:bold;border:none;border-radius:8px;cursor:pointer}
#b-n{background:#4dabf7;color:#fff}#b-r{background:#e9ecef;color:#495057}
.i-s{font-size:14px;line-height:1.4;background:#fff9db;padding:12px;border-radius:8px;border:1px solid #fab005;overflow-y:auto;flex:1}
.bold{font-weight:bold;font-size:1.1em}
#cp{background:#fff;border-radius:12px;display:flex;justify-content:center;align-items:center}
canvas{max-width:100%;max-height:70vh;object-fit:contain}
</style></head><body><div class="a-c"><div class="u-p"><div class="f-g"><input type="number" id="v1" value="1" min="1" class="b-i"><div class="l" style="background:#0055ff"></div><input type="number" id="v2" value="2" min="1" class="b-i"></div><span style="font-size:20px">×</span><div class="f-g"><input type="number" id="v3" value="1" min="1" class="r-i"><div class="l" style="background:#ee0000"></div><input type="number" id="v4" value="3" min="1" class="r-i"></div><div id="r-a" style="display:none;align-items:center;gap:8px"><span style="font-size:20px">=</span><div class="f-g" style="color:#2b8a3e;font-weight:bold"><span id="rn"></span><div class="l" style="background:#2b8a3e"></div><span id="rd"></span></div></div></div><div class="main-layout"><div id="cp"></div><div class="side-panel"><div class="b-c"><button id="b-n" onclick="_n()">次へ進む</button><button id="b-r" onclick="_r()">やり直し</button></div><div class="i-s" id="gt"></div></div></div></div><script>let _s=0,a,b,c,d,cv;function setup(){let s=min(windowWidth*0.5,windowHeight*0.6,400);if(windowWidth<768)s=min(windowWidth-40,350);cv=createCanvas(s,s);cv.parent("cp");["v1","v2","v3","v4"].forEach(x=>document.getElementById(x).addEventListener("change",_r));_u();_x()}function windowResized(){let s=min(windowWidth*0.5,windowHeight*0.6,400);if(windowWidth<768)s=min(windowWidth-40,350);resizeCanvas(s,s)}function _u(){a=int(document.getElementById("v1").value)||1;b=int(document.getElementById("v2").value)||1;c=int(document.getElementById("v3").value)||1;d=int(document.getElementById("v4").value)||1;document.getElementById("rn").innerText=a*c;document.getElementById("rd").innerText=b*d}function _n(){if(_s<4){_s++;_x()}}function _r(){_s=0;_u();_x()}function _x(){const g=document.getElementById("gt"),r=document.getElementById("r-a"),k=document.getElementById("b-n");r.style.display=_s>=3?"flex":"none";if(_s===0){g.innerHTML="分数を入力して「次へ進む」を押してね！";k.innerText="計算をはじめる";k.style.display="block"}else if(_s===1){g.innerHTML=`<b style="color:#0055ff">① たてに分ける</b><br>1の正方形を <span class="bold">${b}等分</span> したうちの <span class="bold">${a}つ分</span> をぬるよ。`;k.innerText="次へ（よこ）"}else if(_s===2){g.innerHTML=`<b style="color:#ee0000">② よこに分ける</b><br>さらに <span class="bold">${d}等分</span> して <span class="bold">${c}つ分</span> を選ぶよ。`;k.innerText="重なりを見る"}else if(_s===3){g.innerHTML=`<b style="color:#2b8a3e">③ 重なりを数える</b><br>色が重なったマスを全部数えると <span class="bold">${a*c}マス</span> あるね。<br>これが<span class="bold">答えの分子</span>になるよ！`;k.innerText="最後に：分母を確認！"}else if(_s===4){g.innerHTML=`<b style="color:#e67e22">④ 分母は「1」の中の数</b><br>オレンジで光っている<span class="bold">「1」の正方形</span>を見て！この1つの中にあるマスは <span class="bold">${b*d}個</span> だね。<br>これが<span class="bold">答えの分母</span>になるよ！`;k.style.display="none"}}function draw(){background(255);let p=width*0.1,z=width-p*1.5,R=ceil(a/b),C=ceil(c/d),M=max(R,C,1),U=z/M;translate(p,p/2);stroke(240);strokeWeight(1);for(let i=0;i<M;i++){for(let j=1;j<b;j++)line(0,i*U+U/b*j,M*U,i*U+U/b*j);for(let j=1;j<d;j++)line(i*U+U/d*j,0,i*U+U/d*j,M*U)}for(let i=0;i<=M;i++){stroke(200);strokeWeight(2);line(0,i*U,M*U,i*U);line(i*U,0,i*U,M*U);noStroke();fill(120);textAlign(CENTER,CENTER);textSize(14);text(i,-15,i*U);text(i,i*U,M*U+15)}if(_s>=1){noStroke();fill(0,85,255,50);rect(0,0,M*U,U/b*a)}if(_s>=2){noStroke();fill(238,0,0,50);rect(0,0,U/d*c,M*U)}if(_s>=3){noStroke();fill(43,138,62,180);rect(0,0,U/d*c,U/b*a);if(a*c<150){fill(255);textSize(constrain(U/max(b,d)*.4,7,12));for(let i=0;i<a;i++){for(let j=0;j<c;j++){text(i*c+j+1,U/d*(j+.5),U/b*(i+.5))}}}}if(_s===4){let f=map(sin(frameCount*.1),-1,1,50,255);stroke(230,126,34,f);strokeWeight(4);noFill();rect(0,0,U,U);fill(230,126,34,40);noStroke();rect(0,0,U,U)}}</script></body></html>
