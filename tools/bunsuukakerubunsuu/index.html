<!DOCTYPE html><html lang="ja"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no"><title>Fraction Sim</title><script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.4.0/p5.js"></script><style>
body{font-family:sans-serif;background:#fff;margin:0;padding:10px;display:flex;justify-content:center}
.a-c{width:100%;max-width:850px;display:flex;flex-direction:column;gap:10px}
.u-p{display:flex;align-items:center;justify-content:space-around;background:#f1f3f5;padding:12px;border-radius:12px;border:1px solid #dee2e6;flex-shrink:0}
.f-g{display:flex;flex-direction:column;align-items:center;gap:2px}
.f-g input{width:45px;height:32px;text-align:center;font-size:18px;border:2px solid #ccc;border-radius:6px}
.b-i{color:#0055ff;border-color:#0055ff!important}.r-i{color:#ee0000;border-color:#ee0000!important}
.l{width:100%;height:2px;background:#333}
.m-c{display:flex;flex-direction:column;gap:15px;align-items:center}

@media (min-width: 768px){
  .m-c{flex-direction:row;align-items:flex-start;justify-content:center}
  .c-a{flex:0 0 auto}
  /* PCでの右側エリアの幅を固定 */
  .o-a{flex:0 0 350px;display:flex;flex-direction:column;gap:10px}
}

/* スマホ等での解説エリアの幅と高さを固定 */
.o-a{width:100%;max-width:350px;display:flex;flex-direction:column;gap:10px}
.b-t{display:flex;gap:8px;width:100%;flex-shrink:0}
button{flex:1;padding:14px;font-size:16px;font-weight:bold;border:none;border-radius:8px;cursor:pointer}
#b-n{background:#4dabf7;color:#fff}#b-r{background:#e9ecef;color:#495057}

/* 解説枠の幅と高さを完全に固定 */
.i-s{width:100%;box-sizing:border-box;height:120px;font-size:15px;line-height:1.6;background:#fff9db;padding:15px;border-radius:8px;border:1px solid #fab005;overflow-y:auto;flex-shrink:0}
.bold{font-weight:bold;font-size:1.1em}
</style></head><body><div class="a-c"><div class="u-p"><div class="f-g"><input type="number" id="v1" value="1" min="1" class="b-i"><div class="l" style="background:#0055ff"></div><input type="number" id="v2" value="2" min="1" class="b-i"></div><span style="font-size:20px">×</span><div class="f-g"><input type="number" id="v3" value="1" min="1" class="r-i"><div class="l" style="background:#ee0000"></div><input type="number" id="v4" value="3" min="1" class="r-i"></div><div id="r-z" style="display:none;align-items:center;gap:8px"><span style="font-size:20px">=</span><div class="f-g" style="color:#2b8a3e;font-weight:bold"><span id="rn"></span><div class="l" style="background:#2b8a3e"></div><span id="rd"></span></div></div></div><div class="m-c"><div class="c-a" id="cp"></div><div class="o-a"><div class="b-t"><button id="b-n" onclick="_x()">次へ進む</button><button id="b-r" onclick="_z()">やり直し</button></div><div class="i-s" id="gt"></div></div></div></div><script>let _s=0,n,d,m,k;function setup(){let w=min(windowWidth-40,380);let v=createCanvas(w,w);v.parent("cp");["v1","v2","v3","v4"].forEach(x=>document.getElementById(x).addEventListener("change",_z));_u();_w()}function _u(){n=int(document.getElementById("v1").value)||1;d=int(document.getElementById("v2").value)||1;m=int(document.getElementById("v3").value)||1;k=int(document.getElementById("v4").value)||1;document.getElementById("rn").innerText=n*m;document.getElementById("rd").innerText=d*k}function _x(){if(_s<4){_s++;_w()}}function _z(){_s=0;_u();_w()}function _w(){const g=document.getElementById("gt"),r=document.getElementById("r-z"),b=document.getElementById("b-n");r.style.display=_s>=3?"flex":"none";if(_s===0){g.innerHTML="分数を入力して「次へ進む」を押してね！";b.innerText="計算をはじめる";b.style.display="block"}else if(_s===1){g.innerHTML=`<b style="color:#0055ff">① たてに分ける</b><br>1の正方形を <span class="bold">${d}等分</span> したうちの <span class="bold">${n}つ分</span> をぬるよ。`;b.innerText="次へ（よこ）"}else if(_s===2){g.innerHTML=`<b style="color:#ee0000">② よこに分ける</b><br>さらに <span class="bold">${k}等分</span> して <span class="bold">${m}つ分</span> を選ぶよ。`;b.innerText="重なりを見る"}else if(_s===3){g.innerHTML=`<b style="color:#2b8a3e">③ 重なりを数える</b><br>色が重なったマスを全部数えると <span class="bold">${n*m}マス</span> あるね。<br>これが<span class="bold">答えの分子</span>になるよ！`;b.innerText="最後に：分母を確認！"}else if(_s===4){g.innerHTML=`<b style="color:#e67e22">④ 分母は「1」の中の数</b><br>オレンジで光っている<span class="bold">「1」の正方形</span>を見て！この1つの中にあるマスは <span class="bold">${d*k}個</span> だね。<br>これが<span class="bold">答えの分母</span>になるよ！`;b.style.display="none"}}function draw(){background(255);let p=40,s=width-p*1.5,R=ceil(n/d),C=ceil(m/k),M=max(R,C,1),U=s/M;translate(p,p/2);stroke(240);strokeWeight(1);for(let i=0;i<M;i++){for(let j=1;j<d;j++)line(0,i*U+U/d*j,M*U,i*U+U/d*j);for(let j=1;j<k;j++)line(i*U+U/k*j,0,i*U+U/k*j,M*U)}for(let i=0;i<=M;i++){stroke(200);strokeWeight(2);line(0,i*U,M*U,i*U);line(i*U,0,i*U,M*U);noStroke();fill(120);textAlign(CENTER,CENTER);textSize(14);text(i,-15,i*U);text(i,i*U,M*U+15)}if(_s>=1){noStroke();fill(0,85,255,50);rect(0,0,M*U,U/d*n)}if(_s>=2){noStroke();fill(238,0,0,50);rect(0,0,U/k*m,M*U)}if(_s>=3){noStroke();fill(43,138,62,180);rect(0,0,U/k*m,U/d*n);if(n*m<150){fill(255);textSize(constrain(U/max(d,k)*.4,7,12));for(let i=0;i<n;i++)for(let j=0;j<m;j++)text(i*m+j+1,U/k*(j+.5),U/d*(i+.5))}}if(_s===4){let f=map(sin(frameCount*.1),-1,1,50,255);stroke(230,126,34,f);strokeWeight(4);noFill();rect(0,0,U,U);fill(230,126,34,40);noStroke();rect(0,0,U,U)}}</script></body></html>
